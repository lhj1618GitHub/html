<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON/JSON5 格式化工具</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        body {
            padding: 20px;
            background: #121212;
            color: #e0e0e0;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #ffffff;
            margin-bottom: 20px;
            font-size: 24px;
        }
        .editor-group {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }
        .editor-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .panel-title {
            padding: 10px 15px;
            background: #1e1e1e;
            color: white;
            border-radius: 6px 6px 0 0;
            font-weight: 500;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            border: 1px solid #333;
            border-bottom: none;
        }
        .panel-info {
            display: flex;
            gap: 15px;
            align-items: center;
            font-size: 13px;
            font-weight: normal;
        }
        .cursor-pos {
            color: #4dabf7;
            font-weight: 500;
        }
        .error-msg {
            color: #ff6b6b;
            font-weight: 500;
        }
        .format-btns {
            display: flex;
            gap: 6px;
        }
        .format-btn {
            padding: 4px 8px;
            font-size: 12px;
            background: #3498db;
            border: none;
            border-radius: 4px;
            color: white;
            cursor: pointer;
        }
        .format-btn:hover {
            background: #2980b9;
        }
        textarea {
            flex: 1;
            min-height: 500px;
            padding: 15px;
            border: 1px solid #333;
            border-top: none;
            border-radius: 0 0 6px 6px;
            resize: vertical;
            font-family: "Consolas", "Monaco", monospace;
            font-size: 14px;
            line-height: 1.5;
            background: #1e1e1e;
            color: #e0e0e0;
        }
        textarea::placeholder {
            color: #888;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            flex-wrap: wrap;
        }
        button {
            padding: 10px 18px;
            border: none;
            border-radius: 6px;
            background: #3498db;
            color: white;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        button:hover {
            background: #2980b9;
        }
        button:active {
            background: #1f618d;
        }
        .file-input-btn {
            position: relative;
            overflow: hidden;
        }
        .file-input-btn input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }
        .status {
            margin-top: 10px;
            padding: 10px 15px;
            border-radius: 6px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1e1e1e;
            border: 1px solid #333;
        }
        .status.valid {
            background: #1e3a1e;
            color: #4caf50;
            border-color: #2e7d32;
        }
        .status.invalid {
            background: #3a1e1e;
            color: #f44336;
            border-color: #c62828;
        }
        .loading {
            color: #ffc107;
            font-weight: bold;
        }
        @media (max-width: 900px) {
            .editor-group {
                flex-direction: column;
            }
            .panel-info {
                flex-direction: column;
                gap: 5px;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>JSON/JSON5 格式化工具</h1>
        <div class="editor-group">
            <div class="editor-panel">
                <div class="panel-title">
                    <span>输入 JSON/JSON5</span>
                    <div class="panel-info">
                        <div class="format-btns">
                            <button class="format-btn" onclick="convertToJson()">→ JSON</button>
                            <button class="format-btn" onclick="convertToJson5()">→ JSON5</button>
                        </div>
                        <span class="cursor-pos" id="cursor-pos">光标位置：行:列</span>
                    </div>
                </div>
                <textarea id="input" placeholder="粘贴或输入JSON/JSON5内容...也可通过下方按钮导入本地文件"></textarea>
                <div class="btn-group">
                    <button onclick="pasteInput()">📋 快捷粘贴</button>
                    <button onclick="clearInput()">🗑️ 清空输入</button>
                    <button class="file-input-btn">📁 导入本地文件
                        <input type="file" id="fileInput" onchange="readLocalFile(this)">
                    </button>
                </div>
            </div>
            <div class="editor-panel">
                <div class="panel-title">
                    <span>格式化结果</span>
                    <div class="panel-info">
                        <span class="error-msg" id="error-msg"></span>
                    </div>
                </div>
                <textarea id="output" readonly placeholder="格式化结果将显示在这里..."></textarea>
                <div class="btn-group">
                    <button onclick="toggleDisplay()">🔄 切换显示</button>
                    <button onclick="copyOutput()">📋 复制结果</button>
                    <button onclick="downloadFile()">⬇️ 下载文件</button>
                </div>
            </div>
        </div>
        <div id="status" class="status">
            <span id="status-msg"></span>
        </div>
    </div>
    <script src="https://gitee.com/lhj1618/GGKD/raw/master/todo/json5.js"></script>
    <script>
        const inputEl = document.getElementById('input');
        const outputEl = document.getElementById('output');
        const statusMsgEl = document.getElementById('status-msg');
        const cursorPosEl = document.getElementById('cursor-pos');
        const errorMsgEl = document.getElementById('error-msg');
        const statusEl = document.getElementById('status');
        
        // 优化：记录当前格式类型 + 切换状态
        let isCompact = false;
        let lastParsed = null;
        let currentFormat = 'json5'; // json / json5

        const CHUNK_SIZE = 1024 * 256;
        let isLoadingLargeFile = false;

        inputEl.addEventListener('input', formatJson);
        inputEl.addEventListener('click', updateCursorPos);
        inputEl.addEventListener('keyup', updateCursorPos);
        inputEl.addEventListener('focus', updateCursorPos);

        // 默认格式化（JSON5）
        function formatJson() {
            if (isLoadingLargeFile) return;
            const input = inputEl.value.trim();
            if (!input) {
                outputEl.value = '';
                lastParsed = null;
                currentFormat = 'json5';
                setStatus('', 'valid');
                setErrorMsg('');
                updateCursorPos();
                return;
            }
            try {
                const parsed = JSON5.parse(input);
                lastParsed = parsed;
                currentFormat = 'json5';
                isCompact = false;
                outputEl.value = JSON5.stringify(parsed, null, 4);
                setStatus('✅ JSON/JSON5 格式有效', 'valid');
                setErrorMsg('');
            } catch (err) {
                outputEl.value = '';
                lastParsed = null;
                setStatus('', 'valid');
                setErrorMsg(`❌ ${err.message}`);
            }
            updateCursorPos();
        }

        // ✅ 核心优化：智能切换显示（自动匹配当前格式）
        function toggleDisplay() {
            if (!lastParsed) {
                setErrorMsg('❌ 暂无有效内容可切换显示');
                return;
            }
            isCompact = !isCompact;
            
            if (currentFormat === 'json') {
                // 当前是 JSON 格式：保持 JSON 标准
                outputEl.value = isCompact ? JSON.stringify(lastParsed) : JSON.stringify(lastParsed, null, 4);
                setStatus(isCompact ? '🔄 JSON【紧凑模式】' : '🔄 JSON【展开模式】', 'valid');
            } else {
                // 当前是 JSON5 格式：保持 JSON5 格式
                outputEl.value = isCompact ? JSON5.stringify(lastParsed) : JSON5.stringify(lastParsed, null, 4);
                setStatus(isCompact ? '🔄 JSON5【紧凑模式】' : '🔄 JSON5【展开模式】', 'valid');
            }
            setTimeout(() => setStatus('', 'valid'), 2000);
        }

        // 转换为标准 JSON
        function convertToJson() {
            const input = inputEl.value.trim();
            if (!input) { setErrorMsg('❌ 无内容可转换'); return; }
            try {
                const parsed = JSON5.parse(input);
                lastParsed = parsed;
                currentFormat = 'json'; // 标记当前为 JSON 格式
                isCompact = false;
                outputEl.value = JSON.stringify(parsed, null, 4);
                setStatus('✅ 已转为标准 JSON', 'valid');
                setErrorMsg('');
            } catch (err) { setErrorMsg(`❌ 转换失败：${err.message}`); }
        }

        // 转换为 JSON5
        function convertToJson5() {
            const input = inputEl.value.trim();
            if (!input) { setErrorMsg('❌ 无内容可转换'); return; }
            try {
                const parsed = JSON5.parse(input);
                lastParsed = parsed;
                currentFormat = 'json5'; // 标记当前为 JSON5 格式
                isCompact = false;
                outputEl.value = JSON5.stringify(parsed, null, 4);
                setStatus('✅ 已转为 JSON5 格式', 'valid');
                setErrorMsg('');
            } catch (err) { setErrorMsg(`❌ 转换失败：${err.message}`); }
        }

        function updateCursorPos() {
            const value = inputEl.value;
            const pos = inputEl.selectionStart;
            const lines = value.substring(0, pos).split('\n');
            const row = lines.length;
            const col = lines[lines.length - 1].length + 1;
            cursorPosEl.textContent = `光标位置：${row}:${col}`;
        }

        function setErrorMsg(msg) { errorMsgEl.textContent = msg; }

        async function pasteInput() {
            try {
                const text = await navigator.clipboard.readText();
                inputEl.value = text;
                formatJson();
                setErrorMsg('');
            } catch (err) { setErrorMsg('❌ 粘贴失败：浏览器权限不足'); }
        }

        async function copyOutput() {
            const text = outputEl.value;
            if (!text) { setErrorMsg('❌ 无内容可复制'); return; }
            try {
                await navigator.clipboard.writeText(text);
                setStatus('✅ 复制成功！', 'valid');
                setTimeout(() => setStatus('', 'valid'), 2000);
            } catch (err) { setErrorMsg('❌ 复制失败'); }
        }

        function clearInput() {
            inputEl.value = '';
            formatJson();
            setErrorMsg('');
        }

        function clearOutput() {}

        function downloadFile() {
            const content = outputEl.value.trim();
            if (!content) { setErrorMsg('❌ 无内容可下载'); return; }
            const blob = new Blob([content], { type: 'application/json5' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = currentFormat === 'json' ? 'formatted.json' : 'formatted.json5';
            document.body.appendChild(a);
            a.click();
            setTimeout(() => {
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                setStatus('✅ 下载完成', 'valid');
                setTimeout(() => setStatus('', 'valid'), 2000);
            }, 100);
        }

        function setStatus(msg, type) {
            statusMsgEl.textContent = msg;
            statusEl.className = `status ${type}`;
        }

        function readLocalFile(fileInput) {
            const file = fileInput.files[0];
            if (!file) return;
            isLoadingLargeFile = true;
            inputEl.value = '';
            setStatus(`⏳ 正在加载超大文件：${file.name}，请稍候...`, 'valid');
            setErrorMsg('');
            const fileReader = new FileReader();
            let offset = 0;
            const fileSize = file.size;
            fileReader.onload = function (e) {
                inputEl.value += e.target.result;
                offset += CHUNK_SIZE;
                loadNextChunk();
            };
            fileReader.onerror = function () {
                isLoadingLargeFile = false;
                setErrorMsg('❌ 文件读取失败');
                fileInput.value = '';
            };
            function loadNextChunk() {
                if (offset >= fileSize) {
                    isLoadingLargeFile = false;
                    setStatus(`✅ 加载完成：${file.name}`, 'valid');
                    formatJson();
                    fileInput.value = '';
                    return;
                }
                const slice = file.slice(offset, offset + CHUNK_SIZE);
                fileReader.readAsText(slice, 'UTF-8');
            }
            loadNextChunk();
        }
    </script>
</body>
</html>
