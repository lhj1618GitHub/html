<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设备维修记录</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        body {
            background: #000;
            color: #e0e0e0;
            padding: 10px;
            max-width: 500px;
            margin: 0 auto;
        }
        .title {
            text-align: center;
            font-size: 18px;
            margin: 10px 0 12px;
            color: #fff;
        }
        .tab-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        .tab-btn {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 6px;
            background: #222;
            color: #aaa;
            font-size: 14px;
        }
        .tab-btn.active {
            background: #0066cc;
            color: #fff;
        }
        .page {
            display: none;
        }
        .page.show {
            display: block;
        }
        .card {
            background: #111;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            border: 1px solid #222;
        }
        .item {
            margin-bottom: 10px;
        }
        .item label {
            display: block;
            font-size: 13px;
            color: #ccc;
            margin-bottom: 4px;
        }
        input, textarea {
            width: 100%;
            padding: 7px 9px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 4px;
            color: #fff;
            font-size: 14px;
            outline: none;
        }
        textarea {
            min-height: 60px;
            resize: vertical;
        }
        .time-row {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .time-input {
            flex: 1;
        }
        .quick-btn {
            padding: 7px 6px;
            font-size: 12px;
            background: #28a745;
            color: #fff;
            border: none;
            border-radius: 4px;
        }
        .btn {
            width: 100%;
            padding: 9px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            background: #0066cc;
            color: #fff;
        }
        .query-btn {
            background: #28a745;
            padding: 8px;
            font-size: 13px;
            margin-right: 6px;
            width: auto;
        }
        .reset-btn {
            background: #555;
            padding: 8px;
            font-size: 13px;
            width: auto;
        }
        .record-card {
            background: #111;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 8px;
            border: 1px solid #222;
            font-size: 13px;
        }
        .record-card .row {
            padding: 4px 0;
            border-bottom: 1px dashed #222;
        }
        .record-card .row:last-child {
            border-bottom: none;
        }
        .record-card .label {
            color: #888;
            display: inline-block;
            width: 70px;
        }
        .record-card .val {
            color: #fff;
        }
        .record-card textarea {
            margin-top: 6px;
            min-height: 40px;
            font-size: 13px;
        }
        .del-btn {
            background: #dc3545;
            color: #fff;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            margin-left: 6px;
        }
        .save-remark {
            background: #0066cc;
            color: #fff;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
        }
        .empty {
            text-align: center;
            padding: 30px 0;
            color: #666;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="title">设备维修记录</div>
    <div class="tab-bar">
        <button class="tab-btn active" onclick="switchPage('add')">新增记录</button>
        <button class="tab-btn" onclick="switchPage('search')">查询记录</button>
    </div>
    <!-- 新增页面 -->
    <div class="page show" id="addPage">
        <div class="card">
            <div class="item">
                <label>设备名称</label>
                <input type="text" id="device" required placeholder="请输入设备名称">
            </div>
            <div class="item">
                <label>维修日期</label>
                <input type="date" id="repairDate" required>
            </div>
            <div class="item">
                <label>开始时间（时:分）</label>
                <div class="time-row">
                    <input class="time-input" type="text" id="start" placeholder="09:00" maxlength="5">
                    <button class="quick-btn" onclick="setNow('start')">当前时间</button>
                </div>
            </div>
            <div class="item">
                <label>结束时间（时:分）</label>
                <div class="time-row">
                    <input class="time-input" type="text" id="end" placeholder="10:00" maxlength="5">
                    <button class="quick-btn" onclick="setNow('end')">当前时间</button>
                </div>
            </div>
            <div class="item">
                <label>维修时长（分钟）</label>
                <input type="text" id="minutes" readonly placeholder="自动计算">
            </div>
            <div class="item">
                <label>问题点</label>
                <input type="text" id="problem" required placeholder="请填写问题点">
            </div>
            <div class="item">
                <label>维修内容</label>
                <textarea id="content" required placeholder="请填写维修内容"></textarea>
            </div>
            <button class="btn" onclick="saveRecord()">保存记录</button>
        </div>
    </div>
    <!-- 查询页面 -->
    <div class="page" id="searchPage">
        <div class="card">
            <div class="item">
                <label>维修日期</label>
                <input type="date" id="qDate">
            </div>
            <div class="item">
                <label>设备名称</label>
                <input type="text" id="qDevice" placeholder="输入设备名称精准/模糊查询">
            </div>
            <div class="item">
                <label>问题点</label>
                <input type="text" id="qProblem" placeholder="输入问题关键词查询">
            </div>
            <button class="btn query-btn" onclick="queryData()">查询</button>
            <button class="btn reset-btn" onclick="resetQuery()">重置</button>
        </div>
        <div id="recordList"></div>
    </div>
<script>
let records = JSON.parse(localStorage.getItem('repairRecords')) || [];
function switchPage(type) {
    document.querySelectorAll('.page').forEach(el => el.classList.remove('show'));
    document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
    document.getElementById(type + 'Page').classList.add('show');
    event.target.classList.add('active');
    if (type === 'search') queryData();
}
window.onload = function () {
    let today = new Date().toISOString().split('T')[0];
    document.getElementById('repairDate').value = today;
    document.getElementById('qDate').value = today;
    document.getElementById('start').addEventListener('input', calcMinutes);
    document.getElementById('end').addEventListener('input', calcMinutes);
}
function setNow(id) {
    let d = new Date();
    let h = String(d.getHours()).padStart(2, '0');
    let m = String(d.getMinutes()).padStart(2, '0');
    document.getElementById(id).value = h + ':' + m;
    calcMinutes();
}
function toMin(str) {
    if (!str || !str.includes(':')) return 0;
    let [h, m] = str.split(':');
    return parseInt(h || 0) * 60 + parseInt(m || 0);
}
function calcMinutes() {
    let s = toMin(document.getElementById('start').value);
    let e = toMin(document.getElementById('end').value);
    let diff = e - s;
    document.getElementById('minutes').value = diff > 0 ? diff : '';
}
function saveRecord() {
    let device = document.getElementById('device').value.trim();
    let date = document.getElementById('repairDate').value;
    let start = document.getElementById('start').value.trim();
    let end = document.getElementById('end').value.trim();
    let minutes = document.getElementById('minutes').value.trim();
    let problem = document.getElementById('problem').value.trim();
    let content = document.getElementById('content').value.trim();
    if (!device || !date || !start || !end || !minutes || !problem || !content) {
        alert('请填写完整信息');
        return;
    }
    let obj = {
        id: Date.now(),
        date: date,
        device: device,
        start: start,
        end: end,
        minutes: minutes,
        problem: problem,
        content: content,
        remark: ''
    };
    records.unshift(obj);
    localStorage.setItem('repairRecords', JSON.stringify(records));
    alert('保存成功！');
    document.getElementById('device').value = '';
    document.getElementById('start').value = '';
    document.getElementById('end').value = '';
    document.getElementById('minutes').value = '';
    document.getElementById('problem').value = '';
    document.getElementById('content').value = '';
}
// 修复：设备名称精准模糊查询逻辑
function queryData() {
    let selDate = document.getElementById('qDate').value;
    let devKey = document.getElementById('qDevice').value.trim();
    let probKey = document.getElementById('qProblem').value.trim();
    let result = records.filter(item => {
        // 日期筛选：有选日期就匹配，为空不限制
        let dateOk = true;
        if(selDate) dateOk = item.date === selDate;
        // 设备名称筛选：为空不限，包含关键词即匹配
        let devOk = true;
        if(devKey) devOk = item.device.includes(devKey);
        // 问题点筛选
        let probOk = true;
        if(probKey) probOk = item.problem.includes(probKey);
        return dateOk && devOk && probOk;
    });
    renderList(result);
}
// 渲染列表 修复时长undefined
function renderList(list) {
    let box = document.getElementById('recordList');
    box.innerHTML = '';
    if (!list || list.length === 0) {
        box.innerHTML = '<div class="empty">暂无查询结果</div>';
        return;
    }
    list.forEach((item, idx) => {
        let html = `
        <div class="record-card">
            <div class="row"><span class="label">日期：</span><span class="val">${item.date}</span></div>
            <div class="row"><span class="label">设备：</span><span class="val">${item.device}</span></div>
            <div class="row"><span class="label">开始：</span><span class="val">${item.start}</span></div>
            <div class="row"><span class="label">结束：</span><span class="val">${item.end}</span></div>
            <div class="row"><span class="label">时长：</span><span class="val">${item.minutes || 0} 分钟</span></div>
            <div class="row"><span class="label">问题：</span><span class="val">${item.problem}</span></div>
            <div class="row"><span class="label">内容：</span><span class="val">${item.content}</span></div>
            <div class="row">
                <span class="label">备注：</span>
                <textarea id="rem_${idx}" placeholder="填写后续备注">${item.remark||''}</textarea>
                <button class="save-remark" onclick="saveRem(${idx})">保存</button>
                <button class="del-btn" onclick="delItem(${idx})">删除记录</button>
            </div>
        </div>
        `;
        box.innerHTML += html;
    });
}
function saveRem(idx){
    let txt = document.getElementById('rem_'+idx).value.trim();
    records[idx].remark = txt;
    localStorage.setItem('repairRecords',JSON.stringify(records));
    alert('备注保存成功');
}
function delItem(idx){
    if(!confirm('确定删除本条维修记录？'))return;
    records.splice(idx,1);
    localStorage.setItem('repairRecords',JSON.stringify(records));
    queryData();
}
function resetQuery(){
    let today = new Date().toISOString().split('T')[0];
    document.getElementById('qDate').value = today;
    document.getElementById('qDevice').value = '';
    document.getElementById('qProblem').value = '';
    queryData();
}
</script>
</body>
</html>
