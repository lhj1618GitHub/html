<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>车辆油耗消费管理</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        primary: '#165DFF',
        fuel: '#FF7D00',
        cost: '#00B42A',
        warn: '#F53F3F',
        darkBg: '#000000',
        darkCard: '#171717',
        darkInput: '#1e1e1e',
        darkText: '#e5e5e5'
      }
    }
  }
}
</script>
<style>
.tab-active { @apply border-b-2 border-primary text-primary font-medium; }
.card-shadow { box-shadow: 0 2px 12px rgba(255,255,255,0.08); }
/* 基础弹窗样式，最简单固定面板 */
.base-modal {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.95);
  z-index: 999;
  padding: 2rem 1rem;
  overflow-y: auto;
  display: none;
}
.base-modal.show {
  display: block;
}
.modal-inner {
  max-width: 520px;
  margin: 0 auto;
}
</style>
</head>
<body class="bg-darkBg min-h-screen text-darkText">
<!-- 主页面容器 -->
<div class="max-w-5xl mx-auto p-4 md:p-6">
  <header class="mb-6 text-center">
    <h1 class="text-[clamp(1.5rem,3vw,2.2rem)] font-bold text-darkText flex items-center justify-center gap-2">
      <i class="fa fa-car text-primary"></i>车辆油耗消费管理系统
    </h1>
  </header>

  <!-- 标签栏 -->
  <div class="flex border-b border-gray-700 mb-6 overflow-x-auto">
    <button class="tab-btn px-4 py-3 whitespace-nowrap tab-active flex items-center gap-1" data-tab="fuel">
      <i class="fa fa-gas-pump text-fuel"></i>加油记录
    </button>
    <button class="tab-btn px-4 py-3 whitespace-nowrap text-gray-400 hover:text-primary flex items-center gap-1" data-tab="cost">
      <i class="fa fa-money text-cost"></i>消费记账
    </button>
    <button class="tab-btn px-4 py-3 whitespace-nowrap text-gray-400 hover:text-primary flex items-center gap-1" data-tab="recordList">
      <i class="fa fa-list-alt text-gray-400"></i>全部记录
    </button>
  </div>

  <!-- 1.加油面板 -->
  <section id="fuel" class="tab-panel">
    <div class="bg-darkCard rounded-lg p-5 card-shadow mb-6">
      <h2 class="text-lg font-semibold mb-4 text-darkText flex items-center gap-2">
        <i class="fa fa-plus-circle text-fuel"></i>新增加油记录
      </h2>
      <div class="grid md:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm text-gray-400 mb-1">加油日期</label>
          <input type="date" id="fuelDate" class="w-full border border-gray-600 bg-darkInput text-darkText rounded px-3 py-2">
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">油价（元/L）</label>
          <input type="number" step="0.01" min="0.01" id="fuelPrice" placeholder="如7.85" class="w-full border border-gray-600 bg-darkInput text-darkText rounded px-3 py-2">
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">本次加油金额（元）</label>
          <input type="number" step="0.01" min="0.01" id="fuelMoney" placeholder="如300" class="w-full border border-gray-600 bg-darkInput text-darkText rounded px-3 py-2">
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">当前总里程（km）</label>
          <input type="number" step="1" min="1" id="fuelMile" placeholder="车辆表显总里程" class="w-full border border-gray-600 bg-darkInput text-darkText rounded px-3 py-2">
        </div>
      </div>
      <div class="mt-4 flex gap-3 items-center">
        <button onclick="addFuelRecord()" class="bg-fuel text-white px-5 py-2 rounded hover:opacity-90 flex items-center gap-1">
          <i class="fa fa-save"></i>保存加油记录
        </button>
        <span id="fuelCalcTip" class="text-sm text-gray-400"></span>
      </div>
    </div>
    <div class="grid md:grid-cols-3 gap-4 mb-6">
      <div class="bg-darkCard p-4 rounded card-shadow">
        <p class="text-gray-400 text-sm">累计加油总升数</p>
        <p id="totalFuelL" class="text-2xl font-bold text-fuel">0.00 L</p>
      </div>
      <div class="bg-darkCard p-4 rounded card-shadow">
        <p class="text-gray-400 text-sm">总行驶里程</p>
        <p id="totalDriveKm" class="text-2xl font-bold text-primary">0 km</p>
      </div>
      <div class="bg-darkCard p-4 rounded card-shadow">
        <p class="text-gray-400 text-sm">长期百公里平均油耗</p>
        <p id="avgFuel100" class="text-2xl font-bold text-warn">0.00 L/100km</p>
      </div>
    </div>
  </section>

  <!-- 2.消费记账面板（到期提醒移至本页面最下方） -->
  <section id="cost" class="tab-panel hidden">
    <div class="bg-darkCard rounded-lg p-5 card-shadow mb-6">
      <h2 class="text-lg font-semibold mb-4 text-darkText flex items-center gap-2">
        <i class="fa fa-plus-circle text-cost"></i>新增车辆消费
      </h2>
      <div class="grid md:grid-cols-2 gap-4">
        <div>
          <label class="block text-sm text-gray-400 mb-1">消费日期</label>
          <input type="date" id="costDate" class="w-full border border-gray-600 bg-darkInput text-darkText rounded px-3 py-2">
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">消费金额（元）</label>
          <input type="number" step="0.01" min="0.01" id="costMoney" placeholder="例：299" class="w-full border border-gray-600 bg-darkInput text-darkText rounded px-3 py-2">
        </div>
        <div class="md:col-span-2">
          <label class="block text-sm text-gray-400 mb-1">消费类型/备注</label>
          <input type="text" id="costRemark" placeholder="保养/洗车/停车/维修/保险等" class="w-full border border-gray-600 bg-darkInput text-darkText rounded px-3 py-2">
        </div>
      </div>
      <div class="mt-4 flex gap-3">
        <button onclick="addCostRecord()" class="bg-cost text-white px-5 py-2 rounded hover:opacity-90 flex items-center gap-1">
          <i class="fa fa-save"></i>保存消费记录
        </button>
        <!-- 打开基础弹窗按钮 -->
        <button onclick="openModal()" class="bg-primary text-white px-4 py-2 rounded hover:opacity-90 flex items-center gap-1">
          <i class="fa fa-cog"></i>保险保养设置
        </button>
      </div>
    </div>
    <!-- 到期提醒模块移至消费标签页最底部 -->
    <div id="remindBox" class="bg-darkCard rounded-lg p-5 card-shadow"></div>
  </section>

  <!-- 3.全部记录面板（统计区新增行驶里程、平均油耗、每公里油费） -->
  <section id="recordList" class="tab-panel hidden">
    <div class="bg-darkCard rounded-lg p-5 card-shadow mb-6">
      <div class="flex flex-wrap items-center justify-between gap-4 mb-4">
        <h3 class="font-medium text-darkText">周期数据统计查询</h3>
        <div class="flex gap-2">
          <button onclick="calcTotal('all')" class="px-3 py-1 border border-gray-600 rounded hover:bg-gray-800">全部时间</button>
          <button onclick="calcTotal('3month')" class="px-3 py-1 border border-gray-600 rounded hover:bg-gray-800">近3个月</button>
          <button onclick="calcTotal('1year')" class="px-3 py-1 border border-gray-600 rounded hover:bg-gray-800">近1年</button>
        </div>
      </div>
      <!-- 统计卡片改为3行3列布局，新增3项里程油耗指标 -->
      <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-4">
        <div class="p-3 bg-gray-800 rounded">
          <p class="text-gray-400 text-sm">加油-次数</p>
          <p id="statFuelCount" class="text-xl font-bold text-fuel">0</p>
        </div>
        <div class="p-3 bg-gray-800 rounded">
          <p class="text-gray-400 text-sm">加油-总金额</p>
          <p id="statFuelMoney" class="text-xl font-bold text-fuel">0.00 元</p>
        </div>
        <div class="p-3 bg-gray-800 rounded">
          <p class="text-gray-400 text-sm">其它消费-总金额</p>
          <p id="statCostMoney" class="text-xl font-bold text-cost">0.00 元</p>
        </div>
        <div class="p-3 bg-gray-800 rounded">
          <p class="text-gray-400 text-sm">合计支出</p>
          <p id="statAllTotal" class="text-xl font-bold text-warn">0.00 元</p>
        </div>
        <!-- 新增指标1：周期行驶里程 -->
        <div class="p-3 bg-gray-800 rounded">
          <p class="text-gray-400 text-sm">期间共行驶里程</p>
          <p id="statDriveKm" class="text-xl font-bold text-primary">0 km</p>
        </div>
        <!-- 新增指标2：周期平均百公里油耗 -->
        <div class="p-3 bg-gray-800 rounded">
          <p class="text-gray-400 text-sm">期间平均油耗</p>
          <p id="statAvgFuel" class="text-xl font-bold text-fuel">0.00 L/100km</p>
        </div>
        <!-- 新增指标3：周期每公里平均油费 -->
        <div class="p-3 bg-gray-800 rounded md:col-start-2">
          <p class="text-gray-400 text-sm">期间每公里油费</p>
          <p id="statCostPerKm" class="text-xl font-bold text-orange-400">0.00 元/km</p>
        </div>
      </div>
      <div class="text-sm text-gray-400 mb-4 text-gray-400">当前筛选周期：<span id="filterTip">全部时间</span></div>
    </div>
    <div class="grid md:grid-cols-2 gap-6">
      <div class="bg-darkCard rounded-lg p-5 card-shadow">
        <h3 class="font-medium mb-3 text-fuel flex items-center gap-1"><i class="fa fa-gas-pump"></i>加油记录（当前筛选周期）</h3>
        <div id="fuelListWrap" class="space-y-2 max-h-96 overflow-y-auto"></div>
      </div>
      <div class="bg-darkCard rounded-lg p-5 card-shadow">
        <h3 class="font-medium mb-3 text-cost flex items-center gap-1"><i class="fa fa-money"></i>消费记录（当前筛选周期）</h3>
        <div id="costListWrap" class="space-y-2 max-h-96 overflow-y-auto"></div>
      </div>
    </div>
  </section>
</div>

<!-- 基础独立弹窗（页面最底部，默认隐藏，仅设置表单，移除内部提醒模块） -->
<div id="insureModal" class="base-modal">
  <div class="modal-inner">
    <!-- 返回关闭按钮 -->
    <div class="mb-6">
      <button onclick="closeModal()" class="flex items-center text-gray-300 hover:text-white gap-1">
        <i class="fa fa-arrow-left"></i>返回主界面
      </button>
    </div>
    <div class="bg-darkCard rounded-lg p-5 card-shadow">
      <h2 class="text-lg font-semibold mb-4 text-darkText flex items-center gap-2">
        <i class="fa fa-car text-primary"></i>保险与保养到期设置
      </h2>
      <div class="space-y-4">
        <div>
          <label class="block text-sm text-gray-400 mb-1">保险到期日</label>
          <input type="date" id="insureDate" class="w-full border border-gray-600 bg-darkInput text-darkText rounded px-3 py-2">
        </div>
        <div>
          <label class="block text-sm text-gray-400 mb-1">下次保养到期日</label>
          <input type="date" id="maintainDate" class="w-full border border-gray-600 bg-darkInput text-darkText rounded px-3 py-2">
        </div>
        <button onclick="saveInsure()" class="bg-primary text-white px-5 py-2 rounded hover:opacity-90 w-full flex items-center justify-center gap-1">
          <i class="fa fa-save"></i>保存到期日期
        </button>
      </div>
    </div>
  </div>
</div>

<script>
const KEY_FUEL = "car_fuel_list";
const KEY_COST = "car_cost_list";
const KEY_INSURE = "car_insure_data";
let currentFilter = "all";
const modal = document.getElementById("insureModal");

window.onload = function(){
  initTab();
  loadInsureData();
  calcFuelAvg();
  calcTotal("all");
  renderAllRecords();
  renderRemind();
  const today = new Date().toISOString().split("T")[0];
  document.getElementById("fuelDate").value = today;
  document.getElementById("costDate").value = today;
}

// 基础弹窗开关（极简控制）
function openModal(){
  modal.classList.add("show");
}
function closeModal(){
  modal.classList.remove("show");
  renderRemind(); // 关闭弹窗后刷新消费页底部提醒
}

// 标签切换
function initTab(){
  const btns = document.querySelectorAll(".tab-btn");
  const panels = document.querySelectorAll(".tab-panel");
  btns.forEach(btn=>{
    btn.onclick = ()=>{
      const target = btn.dataset.tab;
      btns.forEach(b=>b.classList.remove("tab-active"));
      btn.classList.add("tab-active");
      panels.forEach(p=>p.classList.add("hidden"));
      document.getElementById(target).classList.remove("hidden");
      if(target === "recordList") renderAllRecords();
      if(target === "cost") renderRemind(); // 切到消费页自动刷新提醒
    }
  })
}

// 加油模块
function getFuel(){
  let d = localStorage.getItem(KEY_FUEL);
  return d ? JSON.parse(d) : [];
}
function saveFuel(arr){
  localStorage.setItem(KEY_FUEL, JSON.stringify(arr));
}
function addFuelRecord(){
  const date = document.getElementById("fuelDate").value;
  const price = Number(document.getElementById("fuelPrice").value);
  const money = Number(document.getElementById("fuelMoney").value);
  const mile = Number(document.getElementById("fuelMile").value);
  if(!date || isNaN(price) || isNaN(money) || isNaN(mile)) return alert("请填全加油信息");
  const L = (money / price).toFixed(2);
  const item = {id:Date.now(), date, price, money, fuelL:L, mile};
  let list = getFuel();
  list.push(item);
  list.sort((a,b)=>a.mile - b.mile);
  saveFuel(list);
  alert(`保存成功，本次加油${L}L`);
  document.getElementById("fuelPrice").value = "";
  document.getElementById("fuelMoney").value = "";
  document.getElementById("fuelMile").value = "";
  calcFuelAvg();
  calcTotal(currentFilter);
  renderAllRecords();
}
function delFuel(id){
  let arr = getFuel().filter(i=>i.id !== id);
  saveFuel(arr);
  calcFuelAvg();
  calcTotal(currentFilter);
  renderAllRecords();
}
function calcFuelAvg(){
  const list = getFuel();
  const elL = document.getElementById("totalFuelL");
  const elKm = document.getElementById("totalDriveKm");
  const elAvg = document.getElementById("avgFuel100");
  if(list.length < 2){
    elL.innerText = "0.00 L";
    elKm.innerText = "0 km";
    elAvg.innerText = "暂无法计算";
    return;
  }
  let sumL = 0;
  list.forEach(i=>sumL += Number(i.fuelL));
  sumL = sumL.toFixed(2);
  const first = list[0].mile;
  const last = list[list.length-1].mile;
  const drive = last - first;
  const avg = (sumL / drive * 100).toFixed(2);
  elL.innerText = sumL + " L";
  elKm.innerText = drive + " km";
  elAvg.innerText = avg + " L/100km";
}

// 保险保养弹窗模块
function getInsureData(){
  let d = localStorage.getItem(KEY_INSURE);
  return d ? JSON.parse(d) : {insure:"",maintain:""};
}
function loadInsureData(){
  const data = getInsureData();
  document.getElementById("insureDate").value = data.insure;
  document.getElementById("maintainDate").value = data.maintain;
}
function saveInsure(){
  const insure = document.getElementById("insureDate").value;
  const maintain = document.getElementById("maintainDate").value;
  localStorage.setItem(KEY_INSURE, JSON.stringify({insure,maintain}));
  alert("保存成功");
  renderRemind();
}
// 渲染到期提醒（渲染到消费记账页面底部）
function renderRemind(){
  const data = getInsureData();
  const wrap = document.getElementById("remindBox");
  if(!data.insure && !data.maintain){
    wrap.innerHTML = "<div class='text-gray-400 text-center py-4'>未设置保险、保养到期日期，暂无提醒</div>";
    return;
  }
  const today = new Date();
  today.setHours(0,0,0,0);
  let html = `<h3 class="font-medium mb-3 text-darkText flex items-center gap-2"><i class="fa fa-bell text-primary"></i>到期提醒</h3>`;
  if(data.insure){
    const d = new Date(data.insure);
    const diff = Math.ceil((d - today) / (1000*3600*24));
    let tip = diff < 0 ? `<span class="text-warn">已过期${Math.abs(diff)}天</span>` : diff <=30 ? `<span class="text-orange-500">剩余${diff}天到期</span>` : `<span class="text-green-500">剩余${diff}天</span>`;
    html += `<p class="mb-2 text-gray-300">保险到期日：${data.insure} — ${tip}</p>`;
  }
  if(data.maintain){
    const d = new Date(data.maintain);
    const diff = Math.ceil((d - today) / (1000*3600*24));
    let tip = diff < 0 ? `<span class="text-warn">已过期${Math.abs(diff)}天</span>` : diff <=30 ? `<span class="text-orange-500">剩余${diff}天到期</span>` : `<span class="text-green-500">剩余${diff}天</span>`;
    html += `<p class="text-gray-300">保养到期日：${data.maintain} — ${tip}</p>`;
  }
  wrap.innerHTML = html;
}

// 消费模块
function getCost(){
  let d = localStorage.getItem(KEY_COST);
  return d ? JSON.parse(d) : [];
}
function saveCost(arr){
  localStorage.setItem(KEY_COST, JSON.stringify(arr));
}
function addCostRecord(){
  const date = document.getElementById("costDate").value;
  const money = Number(document.getElementById("costMoney").value);
  const remark = document.getElementById("costRemark").value.trim();
  if(!date || isNaN(money) || !remark) return alert("请填全消费信息");
  const item = {id:Date.now(), date, money, remark};
  let list = getCost();
  list.push(item);
  saveCost(list);
  alert("消费记录保存成功");
  document.getElementById("costMoney").value = "";
  document.getElementById("costRemark").value = "";
  calcTotal(currentFilter);
  renderAllRecords();
}
function delCost(id){
  let arr = getCost().filter(i=>i.id !== id);
  saveCost(arr);
  calcTotal(currentFilter);
  renderAllRecords();
}

// 周期统计过滤（新增里程、油耗、每公里油费计算）
function getStartDate(type){
  const now = new Date();
  let start = null;
  let tip = "全部时间";
  if(type === "3month"){
    start = new Date();
    start.setMonth(now.getMonth() - 3);
    tip = "近3个月";
  }else if(type === "1year"){
    start = new Date();
    start.setFullYear(now.getFullYear() - 1);
    tip = "近1年";
  }
  return {start, tip};
}
function calcTotal(type){
  currentFilter = type;
  const fuelAll = getFuel();
  const costAll = getCost();
  const {start, tip} = getStartDate(type);
  document.getElementById("filterTip").innerText = tip;

  // 过滤周期内加油数据
  let fuelFilter = fuelAll;
  if(start) fuelFilter = fuelAll.filter(i=>new Date(i.date) >= start);
  const fuelCount = fuelFilter.length;
  let fuelSumMoney = 0;
  let fuelSumL = 0;
  fuelFilter.forEach(i=>{
    fuelSumMoney += Number(i.money);
    fuelSumL += Number(i.fuelL);
  });

  // 周期行驶里程：取周期第一条和最后一条加油记录里程差值
  let driveKm = 0;
  if(fuelFilter.length >= 2){
    fuelFilter.sort((a,b)=>a.mile - b.mile);
    const firstMile = fuelFilter[0].mile;
    const lastMile = fuelFilter[fuelFilter.length - 1].mile;
    driveKm = lastMile - firstMile;
  }

  // 周期平均百公里油耗
  let avgFuel100 = 0;
  if(driveKm > 0) avgFuel100 = (fuelSumL / driveKm * 100);

  // 周期每公里平均油费
  let costPerKm = 0;
  if(driveKm > 0) costPerKm = fuelSumMoney / driveKm;

  // 过滤周期内消费数据
  let costFilter = costAll;
  if(start) costFilter = costAll.filter(i=>new Date(i.date) >= start);
  let costSumMoney = 0;
  costFilter.forEach(i=>costSumMoney += Number(i.money));
  const allSum = fuelSumMoney + costSumMoney;

  // 原有统计赋值
  document.getElementById("statFuelCount").innerText = fuelCount + " 次";

  document.getElementById("statFuelMoney").innerText = fuelSumMoney.toFixed(2) + " 元";
  document.getElementById("statCostMoney").innerText = costSumMoney.toFixed(2) + " 元";
  document.getElementById("statAllTotal").innerText = allSum.toFixed(2) + " 元";

  // 新增三项统计赋值
  document.getElementById("statDriveKm").innerText = driveKm + " km";
  document.getElementById("statAvgFuel").innerText = avgFuel100.toFixed(2) + " L/100km";
  document.getElementById("statCostPerKm").innerText = costPerKm.toFixed(3) + " 元/km";

  renderAllRecords();
}
function renderAllRecords(){
  const {start} = getStartDate(currentFilter);
  // 加油列表
  let fuelArr = getFuel();
  if(start) fuelArr = fuelArr.filter(i=>new Date(i.date) >= start);
  let fuelHtml = fuelArr.length === 0 ? "<div class='text-gray-400'>当前周期无加油数据</div>" : "";
  fuelArr.forEach(item=>{
    fuelHtml += `<div class="border border-gray-700 p-2 rounded mb-2 text-sm flex justify-between items-center">
      <span class="text-gray-300">${item.date} ${item.price}元/L ${item.money}元 ${item.fuelL}L 里程${item.mile}</span>
      <button onclick="delFuel(${item.id})" class="text-warn text-sm"><i class="fa fa-times"></i></button>
    </div>`;
  })
  document.getElementById("fuelListWrap").innerHTML = fuelHtml;

  // 消费列表
  let costArr = getCost();
  if(start) costArr = costArr.filter(i=>new Date(i.date) >= start);
  let costHtml = costArr.length === 0 ? "<div class='text-gray-400'>当前周期无消费数据</div>" : "";
  costArr.forEach(item=>{
    costHtml += `<div class="border border-gray-700 p-2 rounded mb-2 text-sm flex justify-between items-center">
      <span class="text-gray-300">${item.date} ${item.remark} ${item.money}元</span>
      <button onclick="delCost(${item.id})" class="text-warn text-sm"><i class="fa fa-times"></i></button>
    </div>`;
  })
  document.getElementById("costListWrap").innerHTML = costHtml;
}
</script>
</body>
</html>
