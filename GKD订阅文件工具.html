<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://raw.giteeusercontent.com/lhj1618/GGKD/raw/master/todo/json5.js"></script>
<title>GKD JSON5 编辑器</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Microsoft Yahei,sans-serif}
body{background:#121212;color:#e5e5e5;padding:15px}
.main-container{max-width:1200px;margin:0 auto}

.toolbar{background:#1e1e1e;padding:10px 12px;border-radius:6px;margin-bottom:15px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;border:1px solid #333}
.btn{padding:4px 8px;border:none;border-radius:3px;cursor:pointer;font-size:12px;white-space:nowrap}
.btn-primary{background:#2563eb;color:#fff}
.btn-success{background:#059669;color:#fff}
.btn-warning{background:#d97706;color:#fff}
.btn-danger{background:#dc2626;color:#eee}
.btn-default{background:#333;color:#eee}
.btn-sm{padding:2px 5px;font-size:11px}

.code-panel{background:#1e1e1e;border-radius:6px;padding:15px;border:1px solid #333}
.panel-title{font-size:16px;font-weight:500;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #333;display:flex;justify-content:space-between;align-items:center}
.cursor-pos{font-size:12px;color:#999;font-weight:normal}
textarea{width:100%;height:72vh;padding:12px;border:1px solid #333;border-radius:4px;font-family:Consolas,monospace;font-size:13px;resize:none;line-height:1.5;background:#171717;color:#e5e5e5}
#parseTip{margin-top:8px;font-size:12px;white-space:pre-wrap}

.mask{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0.8);display:none;align-items:center;justify-content:center;z-index:999}
.modal{background:#1e1e1e;border:1px solid #333;border-radius:6px;padding:18px;width:620px}
.modal-title{font-size:15px;font-weight:500;margin-bottom:15px}
.modal-footer{text-align:right;display:flex;gap:6px;justify-content:flex-end}

.visual-mask{padding:15px}
.visual-box{width:100%;height:100%;background:#1e1e1e;border:1px solid #333;border-radius:6px;padding:15px;overflow:auto}
.close-visual{float:right;margin-bottom:10px}

.info-card{background:#171717;border:1px solid #333;padding:12px;border-radius:6px;margin-bottom:15px}
.info-item{line-height:2;font-size:12px;display:flex;align-items:center;gap:6px}
.info-label{font-weight:500;width:85px;display:inline-block;color:#aaa}

.app-list-head{display:flex;justify-content:space-between;align-items:center;margin:15px 0 8px;gap:10px}
.app-list-head span{font-size:14px;font-weight:500}
.app-search-row{display:flex;gap:6px;align-items:center}
#appSearch{padding:4px 8px;background:#171717;border:1px solid #333;border-radius:4px;color:#eee;font-size:12px;width:220px}

.list-wrap{margin-top:8px}
.app-item,.group-item,.rule-item{padding:10px;border:1px solid #333;border-radius:6px;margin-bottom:8px;background:#171717}
.app-title,.group-title{cursor:pointer;user-select:none}
.app-desc,.group-desc{font-size:12px;color:#999;line-height:1.5}
.rule-desc{display:none}

.child-wrap{display:none}
.child-wrap.open{display:block}
#fileInput{display:none}
</style>
</head>
<body>
<div class="main-container">
    <div class="toolbar">
        <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">导入</button>
        <button class="btn btn-danger" onclick="downloadJson5()">导出</button>
        <button class="btn btn-default" onclick="clearContent()">清空</button>
        <button class="btn btn-success" onclick="parseJson5()">解析</button>
        <button class="btn btn-warning" onclick="toggleCodeView()">紧凑/展开</button>
        <button class="btn btn-primary" onclick="openVisualManage()">可视化</button>
        <input type="file" id="fileInput" accept=".json5,.json,.txt" onchange="importLocalFile(event)">
    </div>

    <div class="code-panel">
        <div class="panel-title">
            <span>JSON5 源码编辑</span>
            <span class="cursor-pos" id="cursorPos">行:1 , 列:1</span>
        </div>
        <textarea id="json5Code" placeholder="粘贴GKD订阅json5内容..."></textarea>
        <div id="parseTip"></div>
    </div>
</div>

<div class="mask visual-mask" id="visualMask">
    <div class="visual-box">
        <button class="btn btn-danger close-visual" onclick="closeVisualManage()">关闭</button>
        <div class="info-card">
            <div class="info-item"><span class="info-label">订阅编号：</span><span id="subId">-</span></div>
            <div class="info-item"><span class="info-label">订阅名称：</span><span id="subName">-</span></div>
            <div class="info-item">
                <span class="info-label">版本号：</span>
                <span id="subVersion">-</span>
                <button class="btn btn-sm btn-warning" onclick="editVersion()">编辑</button>
            </div>
            <div class="info-item"><span class="info-label">作者：</span><span id="subAuthor">-</span></div>
            <div class="info-item"><span class="info-label">更新地址：</span><span id="subUpdateUrl">-</span></div>
            <div class="info-item"><span class="info-label">主页地址：</span><span id="subSupportUri">-</span></div>
        </div>

        <div style="font-size:14px;font-weight:500;margin:15px 0 8px">全局规则组</div>
        <div id="globalGroupsWrap" class="list-wrap">暂无</div>

        <div class="app-list-head">
            <span>应用规则列表</span>
            <div class="app-search-row">
                <input id="appSearch" placeholder="搜索应用名称/包名">
                <button class="btn btn-sm btn-primary" onclick="doSearch()">搜索</button>
            </div>
        </div>
        <div id="appsWrap" class="list-wrap">暂无</div>
    </div>
</div>

<div class="mask" id="editMask">
    <div class="modal">
        <div class="modal-title" id="editModalTitle">编辑</div>
        <textarea id="editCode" style="width:100%;height:260px;margin:10px 0;background:#171717;color:#eee;border:1px solid #333;border-radius:4px;padding:10px;font-family:Consolas"></textarea>
        <div class="modal-footer">
            <button class="btn btn-default" onclick="closeEditMask()">取消</button>
            <button class="btn btn-success" onclick="saveEditContent()">保存</button>
        </div>
    </div>
</div>

<script>
// 工具函数
function safeArr(v){return Array.isArray(v)?v:[]}
function hasValidKey(key){return key!==undefined&&key!==null&&key!==''}

// 全局变量
let subscriptionData = null;
let isCompact = false;
let editTarget = { type:'', idx1:-1, idx2:-1, idx3:-1 };
let expandedApps = new Set();
let expandedGroups = new Set();
let lastSearchKey = '';

// DOM 延后获取
let codeArea, cursorPosEl, parseTipEl, appSearchEl;

// 页面加载完毕再初始化
document.addEventListener('DOMContentLoaded',function(){
    codeArea = document.getElementById('json5Code');
    cursorPosEl = document.getElementById('cursorPos');
    parseTipEl = document.getElementById('parseTip');
    appSearchEl = document.getElementById('appSearch');

    codeArea.addEventListener('click', updateCursor);
    codeArea.addEventListener('keyup', updateCursor);
    appSearchEl.addEventListener('keydown',e=>{if(e.key==='Enter')doSearch()});

    updateCursor();
});

// 光标
function updateCursor(){
    let s = codeArea.selectionStart;
    let t = codeArea.value.substring(0,s).split('\n');
    cursorPosEl.innerText = `行:${t.length} , 列:${t[t.length-1].length}`;
}

// 清空
function clearContent(){
    codeArea.value = '';
    parseTipEl.innerText = '';
    subscriptionData = null;
    expandedApps.clear();
    expandedGroups.clear();
    lastSearchKey = '';
    appSearchEl.value = '';
    updateCursor();
}

// 紧凑/展开
function toggleCodeView(){
    if(!subscriptionData){alert('请先解析');return;}
    isCompact = !isCompact;
    codeArea.value = isCompact ? JSON5.stringify(subscriptionData) : JSON5.stringify(subscriptionData,null,2);
    updateCursor();
}

// 本地导入
function importLocalFile(e){
    let f = e.target.files[0];
    if(!f) return;
    let r = new FileReader;
    r.onload = function(ev){
        codeArea.value = ev.target.result;
        parseJson5();
        updateCursor();
    };
    r.readAsText(f);
    e.target.value = '';
}

// 提示
function showErr(m){parseTipEl.style.color='#f87171';parseTipEl.innerText=m}
function showOk(m){parseTipEl.style.color='#4ade80';parseTipEl.innerText=m}

// 解析核心
function parseJson5(){
    let c = codeArea.value.trim();
    if(!c){showErr('请输入JSON5内容');subscriptionData=null;return;}
    try{
        subscriptionData = JSON5.parse(c);
        codeArea.value = JSON5.stringify(subscriptionData,null,2);
        isCompact = false;
        expandedApps.clear();
        expandedGroups.clear();
        lastSearchKey = '';
        appSearchEl.value = '';
        showOk('解析成功');
        renderAllView();
    }catch(err){
        showErr('解析失败：'+err.message);
        subscriptionData = null;
    }
    updateCursor();
}

// 搜索
function doSearch(){
    lastSearchKey = appSearchEl.value.trim().toLowerCase();
    renderApps();
}

// 弹窗
function openVisualManage(){
    if(!subscriptionData){alert('请先解析');return;}
    renderAllView();
    document.getElementById('visualMask').style.display='flex';
}
function closeVisualManage(){
    document.getElementById('visualMask').style.display='none';
}

// 渲染总入口
function renderAllView(){
    if(!subscriptionData) return;
    document.getElementById('subId').innerText = subscriptionData.id ?? '-';
    document.getElementById('subName').innerText = subscriptionData.name ?? '-';
    document.getElementById('subVersion').innerText = subscriptionData.version ?? 0;
    document.getElementById('subAuthor').innerText = subscriptionData.author ?? '-';
    document.getElementById('subUpdateUrl').innerText = subscriptionData.updateUrl ?? '-';
    document.getElementById('subSupportUri').innerText = subscriptionData.supportUri ?? '-';
    renderGlobalGroups();
    renderApps();
}

// 渲染全局规则组
function renderGlobalGroups(){
    let wrap = document.getElementById('globalGroupsWrap');
    let g = safeArr(subscriptionData.globalGroups);
    if(!g.length){wrap.innerHTML='<div class="app-item">暂无</div>';return}
    let html='';
    g.forEach((item,idx)=>{
        let keyText = hasValidKey(item.key) ? `规则组${item.key}：` : '';
        html += `<div class="app-item"><div class="app-head">
        <span>${keyText}${item.name||'未命名'}</span>
        <div>
        <button class="btn btn-sm btn-warning" onclick="editGlobalGroup(${idx})">编辑</button>
        <button class="btn btn-sm btn-danger" onclick="delGlobalGroup(${idx})">删除</button>
        </div></div>
        ${hasValidKey(item.key)?`<div class="app-desc">key：${item.key}</div>`:''}</div>`;
    });
    wrap.innerHTML = html;
}

// 渲染应用列表
function renderApps(){
    let wrap = document.getElementById('appsWrap');
    let apps = safeArr(subscriptionData.apps);
    let filterApps = apps.filter(app=>{
        let n = (app.name||'').toLowerCase();
        let id = (app.id||'').toLowerCase();
        return n.includes(lastSearchKey) || id.includes(lastSearchKey);
    });
    if(!filterApps){wrap.innerHTML='<div class="app-item">无匹配应用</div>';return}
    let html='';
    filterApps.forEach((app,appIdx)=>{
        let realIdx = apps.indexOf(app);
        let appOpen = expandedApps.has(realIdx);
        let groups = safeArr(app.groups);
        html += `<div class="app-item"><div class="app-head">
        <span class="app-title" onclick="toggleAppExpand(${realIdx})">${appOpen?'▼':'▶'} ${app.name||'未命名'} (${app.id})</span>
        <div>
        <button class="btn btn-sm btn-warning" onclick="editApp(${realIdx})">编辑</button>
        <button class="btn btn-sm btn-danger" onclick="delApp(${realIdx})">删除</button>
        <button class="btn btn-sm btn-primary" onclick="addEmptyGroup(${realIdx})">加规则组</button>
        </div></div><div class="child-wrap ${appOpen?'open':''}">`;
        if(!groups.length){html+='<div class="group-item">暂无规则组</div>';}
        else{
            groups.forEach((group,groupIdx)=>{
                let gKey = `${realIdx}-${groupIdx}`;
                let gOpen = expandedGroups.has(gKey);
                let rules = safeArr(group.rules);
                let keyText = hasValidKey(group.key) ? `规则组${group.key}：` : '';
                html += `<div class="group-item"><div class="group-head">
                <span class="group-title" onclick="toggleGroupExpand(${realIdx},${groupIdx})">${gOpen?'▼':'▶'} ${keyText}${group.name||'未命名'}</span>
                <div>
                <button class="btn btn-sm btn-warning" onclick="editGroup(${realIdx},${groupIdx})">编辑</button>
                <button class="btn btn-sm btn-danger" onclick="delGroup(${realIdx},${groupIdx})">删除</button>
                <button class="btn btn-sm btn-primary" onclick="addEmptyRule(${realIdx},${groupIdx})">加子规则</button>
                </div></div>
                ${hasValidKey(group.key)?`<div class="group-desc">key：${group.key}</div>`:''}
                <div class="child-wrap ${gOpen?'open':''}">`;
                if(!rules.length){html+='<div class="rule-item">暂无子规则</div>';}
                else{
                    rules.forEach((rule,ruleIdx)=>{
                        let rKeyText = hasValidKey(rule.key) ? `子规则${rule.key}：` : '';
                        html += `<div class="rule-item"><div class="rule-head">
                        <span>${rKeyText}${rule.name||'未命名'}</span>
                        <div>
                        <button class="btn btn-sm btn-warning" onclick="editRule(${realIdx},${groupIdx},${ruleIdx})">编辑</button>
                        <button class="btn btn-sm btn-danger" onclick="delRule(${realIdx},${groupIdx})">删除</button>
                        </div></div></div>`;
                    });
                }
                html += `</div></div>`;
            });
        }
        html += `</div></div>`;
    });
    wrap.innerHTML = html;
}

// 折叠
function toggleAppExpand(i){expandedApps.has(i)?expandedApps.delete(i):expandedApps.add(i);renderApps()}
function toggleGroupExpand(a,g){let k=`${a}-${g}`;expandedGroups.has(k)?expandedGroups.delete(k):expandedGroups.add(k);renderApps()}

// 同步
function syncToCode(){
    if(!subscriptionData) return;
    codeArea.value = JSON5.stringify(subscriptionData,null,2);
    isCompact = false;
    updateCursor();
}

// 导出
function downloadJson5(){
    let blob = new Blob([codeArea.value],{type:'text/plain'});
    let a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'gkd.json5';
    a.click();
}

// 编辑
function editVersion(){
    editTarget={type:'version'};
    document.getElementById('editModalTitle').innerText='编辑版本号';
    document.getElementById('editCode').value=String(subscriptionData.version??0);
    document.getElementById('editMask').style.display='flex';
}
function editGlobalGroup(i){
    editTarget={type:'globalGroup',idx1:i};
    document.getElementById('editModalTitle').innerText='编辑全局规则组';
    document.getElementById('editCode').value=JSON5.stringify(subscriptionData.globalGroups[i],null,2);
    document.getElementById('editMask').style.display='flex';
}
function editApp(i){
    editTarget={type:'app',idx1:i};
    document.getElementById('editModalTitle').innerText='编辑应用';
    document.getElementById('editCode').value=JSON5.stringify(subscriptionData.apps[i],null,2);
    document.getElementById('editMask').style.display='flex';
}
function editGroup(a,g){
    editTarget={type:'group',idx1:a,idx2:g};
    document.getElementById('editModalTitle').innerText='编辑规则组';
    document.getElementById('editCode').value=JSON5.stringify(subscriptionData.apps[a].groups[g],null,2);
    document.getElementById('editMask').style.display='flex';
}
function editRule(a,g,r){
    editTarget={type:'rule',idx1:a,idx2:g,idx3:r};
    let rule = subscriptionData.apps[a].groups[g].rules[r];
    document.getElementById('editModalTitle').innerText='编辑子规则';
    document.getElementById('editCode').value = JSON5.stringify(rule,null,2);
    document.getElementById('editMask').style.display='flex';
}
function closeEditMask(){
    document.getElementById('editMask').style.display='none';
}

// 保存
function saveEditContent(){
    let v = document.getElementById('editCode').value.trim();
    try{
        let o = JSON5.parse(v);
        if(editTarget.type === 'version'){
            let n = parseInt(v);
            subscriptionData.version = isNaN(n)?0:n;
        }else{
            switch(editTarget.type){
                case 'globalGroup': subscriptionData.globalGroups[editTarget.idx1]=o;break;
                case 'app': subscriptionData.apps[editTarget.idx1]=o;break;
                case 'group': subscriptionData.apps[editTarget.idx2]=o;break;
                case 'rule': subscriptionData.apps[editTarget.idx1].groups[editTarget.idx2].rules[editTarget.idx3]=o;break;
            }
        }
        syncToCode();renderAllView();closeEditMask();
    }catch(e){alert('JSON5 格式错误')}
}

// 删除
function delGlobalGroup(i){if(!confirm('确定删除？'))return;subscriptionData.globalGroups.splice(i,1);syncToCode();renderAllView()}
function delApp(i){if(!confirm('确定删除？'))return;subscriptionData.apps.splice(i,1);expandedApps.delete(i);syncToCode();renderApps()}
function delGroup(a,g){if(!confirm('确定删除？'))return;subscriptionData.apps[a].groups.splice(g,1);syncToCode();renderApps()}
function delRule(a,g,r){if(!confirm('确定删除？'))return;subscriptionData.apps[a].groups[g].rules.splice(r,1);syncToCode();renderApps()}

// 新增
function addEmptyGroup(i){
    if(!subscriptionData.apps[i].groups) subscriptionData.apps[i].groups=[];
    let k = subscriptionData.apps[i].groups.length;
    subscriptionData.apps[i].groups.push({key:k,name:'新规则组-未命名',rules:[]});
    expandedApps.add(i);
    syncToCode();renderApps();
}
function addEmptyRule(a,g){
    let group = subscriptionData.apps[a].groups[g];
    if(!group.rules) group.rules=[];
    let k = group.rules.length;
    group.rules.push({key:k,name:'新子规则',fastQuery:true,activityIds:'',matches:'',snapshotUrls:''});
    expandedGroups.add(`${a}-${g}`);
    syncToCode();renderApps();
}
</script>
</body>
</html>
