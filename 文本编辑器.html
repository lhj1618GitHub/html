<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>本地文本编辑器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", monospace;
        }
        body {
            background-color: #000;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .toolbar {
            padding: 12px;
            background-color: #1a1a1a;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        button {
            padding: 8px 16px;
            background-color: #2d2d2d;
            color: #fff;
            border: 1px solid #444;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }
        button:hover {
            background-color: #444;
        }
        #fileInput {
            display: none;
        }
        #editor {
            flex: 1;
            width: 100%;
            padding: 15px;
            background-color: #000;
            color: #ffffff;
            border: none;
            outline: none;
            resize: none;
            font-size: 16px;
            line-height: 1.5;
        }
        .filename {
            color: #ccc;
            font-size: 14px;
            margin-left: auto;
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <button id="openBtn">打开本地文件</button>
        <button id="saveBtn">保存文件</button>
        <button id="clearBtn">清空</button>
        <span class="filename" id="fileName">未打开文件</span>
    </div>
    <textarea id="editor" placeholder="请打开文件或直接编辑内容..."></textarea>
    <input type="file" id="fileInput">
    <script>
        const fileInput = document.getElementById('fileInput');
        const editor = document.getElementById('editor');
        const saveBtn = document.getElementById('saveBtn');
        const openBtn = document.getElementById('openBtn');
        const clearBtn = document.getElementById('clearBtn');
        const fileName = document.getElementById('fileName');
        
        let currentFile = '';

        // 打开文件
        openBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (event) => {
                editor.value = event.target.result;
                currentFile = file.name;
                fileName.textContent = `当前文件：${currentFile}`;
            };
            reader.readAsText(file, 'UTF-8');
        });

        // 保存文件（支持自定义文件名）
        saveBtn.addEventListener('click', () => {
            const content = editor.value;
            if (!content) {
                alert('编辑内容不能为空！');
                return;
            }

            // 默认文件名
            const defaultName = currentFile || 'untitled.txt';
            // 弹窗输入自定义文件名
            let inputName = prompt('请输入保存的文件名', defaultName);
            
            // 用户取消
            if (inputName === null) return;
            // 空则用默认
            inputName = inputName.trim() || defaultName;

            const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
            const a = document.createElement('a');
            const url = URL.createObjectURL(blob);
            a.href = url;
            a.download = inputName;
            a.click();
            URL.revokeObjectURL(url);

            // 更新当前文件名
            currentFile = inputName;
            fileName.textContent = `当前文件：${currentFile}`;
            
            alert('文件保存成功！');
        });

        // 清空内容
        clearBtn.addEventListener('click', () => {
            editor.value = '';
            currentFile = '';
            fileName.textContent = '未打开文件';
        });
    </script>
</body>
</html>
