<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>本地记录存档</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--xs:.3rem;--sm:.6rem;--md:1rem;--lg:1.5rem;--blue:#4cc9f0;--bg1:#1a1a2e;--bg2:#16213e;--card:rgba(255,255,255,.08)}
body{font-family:Segoe UI,Arial;background:linear-gradient(135deg,var(--bg1),var(--bg2));color:#e6e6e6;min-height:100vh;padding:var(--sm);line-height:1.5}
.container{max-width:1200px;margin:0 auto;width:100%;height:calc(100vh - var(--sm)*2);display:flex;flex-direction:column}
header{text-align:center;margin-bottom:var(--md);padding:var(--sm);background:rgba(255,255,255,.05);border-radius:10px;backdrop-filter:blur(10px)}
h1{color:var(--blue);font-size:1.5rem}
.tab-nav{display:flex;background:var(--card);border-radius:10px 10px 0 0;overflow:hidden}
.tab-btn{flex:1;padding:var(--xs);background:transparent;border:none;color:#a0a0a0;font-size:.95rem;font-weight:600;cursor:pointer}
.tab-btn.active{background:rgba(255,255,255,.15);color:var(--blue);border-bottom:3px solid var(--blue)}
/* 关键：标签内容自适应剩余高度 */
.tab-content{display:none;background:var(--card);padding:var(--sm);border-radius:0 0 10px 10px;flex:1;overflow:hidden}
.tab-content.active{display:flex;flex-direction:column}
.section{background:rgba(255,255,255,.1);padding:var(--sm);border-radius:10px;margin-bottom:var(--sm);flex:1;display:flex;flex-direction:column;overflow:hidden}
.form-group{margin-bottom:var(--sm)}
label{display:block;margin-bottom:var(--xs);color:var(--blue);font-weight:600}
input,textarea{width:100%;padding:var(--xs);background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);border-radius:8px;color:#e6e6e6;font-size:.95rem}
input:focus,textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 2px rgba(76,201,240,.3)}
/* 添加页textarea自适应高度 */
textarea#recContent{flex:1;min-height:120px;resize:none}
/* 按钮组：并排+不换行+自适应 */
.btn-group{display:flex;gap:var(--xs);flex-wrap:nowrap;align-items:center}
.btn{padding:var(--xs) var(--sm);border:none;border-radius:8px;font-size:.95rem;font-weight:600;cursor:pointer;min-width:100px;text-align:center}
.btn-primary{background:linear-gradient(135deg,var(--blue),#4361ee);color:#fff}
.btn-secondary{background:rgba(255,255,255,.15);color:#e6e6e6;border:1px solid rgba(255,255,255,.3)}
.btn-danger{background:linear-gradient(135deg,#f72585,#b5179e);color:#fff}
.btn-warning{background:linear-gradient(135deg,#f8961e,#f3722c);color:#fff}
.list{flex:1;overflow-y:auto}
.item{background:var(--card);padding:var(--sm);margin-bottom:var(--xs);border-radius:8px;border-left:4px solid var(--blue);cursor:pointer}
.item-header{display:flex;justify-content:space-between;margin-bottom:var(--xs)}
.item-name{font-weight:600;color:var(--blue)}
.item-date{color:#a0a0a0;font-size:.85rem}
.item-content{color:#ccc;max-height:60px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.empty{text-align:center;padding:var(--lg);color:#a0a0a0}
.status{position:fixed;top:1rem;left:50%;transform:translateX(-50%);padding:var(--xs) var(--sm);border-radius:5px;font-weight:600;z-index:9999}
.success{background:rgba(76,175,80,.3);color:#4caf50}
.error{background:rgba(244,67,54,.3);color:#f44336}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;justify-content:center;align-items:center;z-index:999;padding:var(--xs)}
.modal-box{background:rgba(26,26,46,.95);padding:var(--sm);border-radius:10px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto}
.modal-title{color:var(--blue);margin-bottom:var(--sm);text-align:center}
.modal-buttons{display:flex;gap:var(--xs);flex-wrap:nowrap;margin-top:1rem}
.modal-btn{flex:1;min-width:100px}
.hidden{display:none}
.highlight{background:rgba(76,201,240,.4);padding:2px 4px;border-radius:3px}
.detail-content{line-height:1.6;white-space:pre-wrap;max-height:300px;overflow-y:auto;padding:var(--xs);background:rgba(0,0,0,.3);border-radius:5px}
.filename-preview{background:rgba(0,0,0,.3);padding:var(--xs);border-radius:5px;margin-top:var(--xs);font-family:monospace;font-size:.85rem;word-break:break-all}
.title-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--sm);gap:var(--sm)}
@media (max-width:768px){.btn-group,.modal-buttons{gap:var(--xs)}.btn{min-width:90px}}
</style>
</head>
<body>
<div class="container">
<header><h1>📁 本地记录存档</h1></header>
<div class="tab-nav">
<button class="tab-btn active" onclick="switchTab('search')">🔍 搜索</button>
<button class="tab-btn" onclick="switchTab('add')">➕ 添加</button>
<button class="tab-btn" onclick="switchTab('view')">📋 查看</button>
</div>
<!-- 搜索 -->
<div id="search" class="tab-content active">
<div class="section">
<h2>🔍 搜索记录</h2>
<div class="form-group"><input id="searchInput" placeholder="关键词搜索..." oninput="doSearch()"></div>
<div id="searchStats" style="margin:5px 0;"></div>
<div id="recentList" class="list empty"><p>暂无记录</p></div>
<div id="searchResult" class="list hidden"></div>
</div>
</div>
<!-- 添加 -->
<div id="add" class="tab-content">
<div class="section">
<h2>添加新记录</h2>
<div class="form-group"><label>名称*</label><input id="recName" placeholder="名称"></div>
<div class="form-group"><label>内容*</label><textarea id="recContent" placeholder="内容"></textarea></div>
<div class="form-group"><label>更新日期*</label><input id="recDate" type="date"></div>
<div class="btn-group">
<button class="btn btn-primary" onclick="saveRec()">💾 保存</button>
<button class="btn btn-secondary" onclick="clearForm()">🗑️ 清除</button>
</div>
</div>
</div>
<!-- 查看 -->
<div id="view" class="tab-content">
<div class="section">
<div class="title-bar">
  <h2>所有记录 (<span id="recCount">0</span>)</h2>
  <!-- 导入导出：始终并排 -->
  <div class="btn-group">
    <label class="btn btn-secondary" style="cursor:pointer;margin:0;">
      📥 导入
      <input type="file" accept=".txt,application/json" onchange="importRec(this.files[0])" style="display:none;">
    </label>
    <button class="btn btn-secondary" onclick="openExportModal()">📤 导出</button>
  </div>
</div>
<div id="recList" class="list empty"><p>暂无记录</p></div>
</div>
</div>
<!-- 详情弹窗 -->
<div id="detailModal" class="modal hidden">
<div class="modal-box">
<h3 class="modal-title" id="detailName"></h3>
<div class="detail-content" id="detailContent"></div>
<div id="editArea" class="hidden">
<div class="form-group"><label>名称</label><input id="editName"></div>
<div class="form-group"><label>内容</label><textarea id="editContent" rows="8"></textarea></div>
</div>
<div class="modal-buttons">
<button class="btn btn-primary" id="editBtn" onclick="startEdit()">✏️ 编辑</button>
<button class="btn btn-danger" id="delBtn" onclick="deleteSingleRec()">🗑️ 删除</button>
<button class="btn btn-secondary" onclick="closeDetail()">关闭</button>
<button class="btn btn-primary hidden" id="saveEditBtn" onclick="saveSingleEdit()">💾 保存修改</button>
<button class="btn btn-secondary hidden" id="cancelEditBtn" onclick="cancelEdit()">取消</button>
</div>
</div>
</div>
<!-- 冲突弹窗 -->
<div id="conflictModal" class="modal hidden">
<div class="modal-box">
<h3 class="modal-title">名称已存在</h3>
<p id="conflictTip"></p>
<div class="modal-buttons">
<button class="btn btn-warning" onclick="choose('update')">覆盖</button>
<button class="btn btn-primary" onclick="choose('append')">追加</button>
<button class="btn btn-secondary" onclick="closeConflict()">取消</button>
</div>
</div>
</div>
<!-- 导出设置弹窗 -->
<div id="exportModal" class="modal hidden">
<div class="modal-box">
<h3 class="modal-title">导出设置</h3>
<div class="form-group">
  <label>导出文件名</label>
  <input id="exportName" value="记录存档" oninput="updatePreview()">
  <div id="filePreview" class="filename-preview"></div>
</div>
<div class="modal-buttons">
  <button class="btn btn-primary" onclick="doExport()">确认导出</button>
  <button class="btn btn-secondary" onclick="closeExportModal()">取消</button>
</div>
</div>
</div>
</div>
<script>
let records = JSON.parse(localStorage.getItem('recs') || '[]');
let current = null;
const d = document;
d.getElementById('recDate').valueAsDate = new Date();
refreshAll();
function switchTab(id){
  d.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  d.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  d.getElementById(id).classList.add('active');
  event.target.classList.add('active');
}
function showMsg(msg,err){
  let el = d.createElement('div');
  el.className = `status ${err?'error':'success'}`;
  el.textContent = msg;
  d.body.appendChild(el);
  setTimeout(()=>el.remove(),2000);
}
function refreshAll(){
  refreshList();
  refreshRecent();
  doSearch();
  updatePreview();
}
function refreshList(){
  let el = d.getElementById('recList');
  let cnt = d.getElementById('recCount');
  cnt.textContent = records.length;
  if(!records.length){el.innerHTML='<div class="empty">暂无记录</div>';return;}
  el.innerHTML = records.map(r=>`
  <div class="item" onclick="openDetail('${r.name}')">
    <div class="item-header">
      <span class="item-name">${esc(r.name)}</span>
      <span class="item-date">${fmtDate(r.updateTime||r.date)}</span>
    </div>
    <div class="item-content">${esc(r.content)}</div>
  </div>`).join('');
}
function refreshRecent(){
  let el = d.getElementById('recentList');
  let list = records.slice(0,5);
  if(!list.length){el.innerHTML='<div class="empty">暂无记录</div>';return;}
  el.innerHTML = list.map(r=>`
  <div class="item" onclick="openDetail('${r.name}')">
    <div class="item-header">
      <span class="item-name">${esc(r.name)}</span>
      <span class="item-date">${fmtDate(r.updateTime||r.date)}</span>
    </div>
    <div class="item-content">${esc(r.content)}</div>
  </div>`).join('');
}
function doSearch(){
  let kw = d.getElementById('searchInput').value.trim().toLowerCase();
  let stats = d.getElementById('searchStats');
  let recent = d.getElementById('recentList');
  let res = d.getElementById('searchResult');
  if(!kw){
    recent.classList.remove('hidden');
    res.classList.add('hidden');
    stats.textContent = '';
    return;
  }
  recent.classList.add('hidden');
  res.classList.remove('hidden');
  let arr = records.filter(x=>x.name.toLowerCase().includes(kw)||x.content.toLowerCase().includes(kw));
  stats.textContent = `找到 ${arr.length} 条`;
  if(!arr.length){res.innerHTML='<div class="empty">无匹配</div>';return;}
  res.innerHTML = arr.map(r=>`
  <div class="item" onclick="openDetail('${r.name}')">
    <div class="item-header">
      <span class="item-name">${hl(r.name,kw)}</span>
      <span class="item-date">${fmtDate(r.updateTime||r.date)}</span>
    </div>
    <div class="item-content">${hl(r.content,kw)}</div>
  </div>`).join('');
}
function saveRec(){
  let n = d.getElementById('recName').value.trim();
  let c = d.getElementById('recContent').value.trim();
  let dt = d.getElementById('recDate').value;
  let now = new Date().toISOString().split('T')[0];
  if(!n||!c||!dt){showMsg('请填写完整',1);return;}
  let ex = records.find(x=>x.name===n);
  if(ex){
    d.getElementById('conflictTip').textContent = `名称「${n}」已存在`;
    d.getElementById('conflictModal').classList.remove('hidden');
    return;
  }
  records.push({name:n,content:c,date:dt,createTime:now,updateTime:now});
  save();
  showMsg('保存成功');
  clearForm();
}
function choose(act){
  let n = d.getElementById('recName').value.trim();
  let c = d.getElementById('recContent').value.trim();
  let dt = d.getElementById('recDate').value;
  let now = new Date().toISOString().split('T')[0];
  let i = records.findIndex(x=>x.name===n);
  if(act==='update') records[i]={name:n,content:c,date:dt,createTime:records[i].createTime,updateTime:now};
  if(act==='append'){records[i].content+='\n\n---追加---\n'+c;records[i].updateTime=now;}
  save();
  closeConflict();
  showMsg('已处理');
  clearForm();
}
function clearForm(){
  d.getElementById('recName').value='';
  d.getElementById('recContent').value='';
  d.getElementById('recDate').valueAsDate=new Date();
}
function openDetail(name){
  current = records.find(x=>x.name===name);
  if(!current)return;
  d.getElementById('detailName').textContent = current.name;
  d.getElementById('detailContent').textContent = current.content;
  d.getElementById('detailModal').classList.remove('hidden');
  d.getElementById('editArea').classList.add('hidden');
  d.getElementById('editBtn').classList.remove('hidden');
  d.getElementById('delBtn').classList.remove('hidden');
  d.getElementById('saveEditBtn').classList.add('hidden');
  d.getElementById('cancelEditBtn').classList.add('hidden');
}
function closeDetail(){
  d.getElementById('detailModal').classList.add('hidden');
  current=null;
}
function startEdit(){
  d.getElementById('editName').value=current.name;
  d.getElementById('editContent').value=current.content;
  d.getElementById('detailContent').classList.add('hidden');
  d.getElementById('editArea').classList.remove('hidden');
  d.getElementById('editBtn').classList.add('hidden');
  d.getElementById('delBtn').classList.add('hidden');
  d.getElementById('saveEditBtn').classList.remove('hidden');
  d.getElementById('cancelEditBtn').classList.remove('hidden');
}
function cancelEdit(){
  d.getElementById('detailContent').classList.remove('hidden');
  d.getElementById('editArea').classList.add('hidden');
  d.getElementById('editBtn').classList.remove('hidden');
  d.getElementById('delBtn').classList.remove('hidden');
  d.getElementById('saveEditBtn').classList.add('hidden');
  d.getElementById('cancelEditBtn').classList.add('hidden');
}
function saveSingleEdit(){
  let n = d.getElementById('editName').value.trim();
  let c = d.getElementById('editContent').value.trim();
  if(!n||!c){showMsg('不能为空',1);return;}
  let i = records.findIndex(x=>x.name===current.name);
  records[i].name=n;
  records[i].content=c;
  records[i].updateTime=new Date().toISOString().split('T')[0];
  save();
  showMsg('修改成功');
  openDetail(n);
}
function deleteSingleRec(){
  if(!confirm('确定删除这条记录？'))return;
  records = records.filter(x=>x.name!==current.name);
  save();
  closeDetail();
  showMsg('已删除');
}
function closeConflict(){d.getElementById('conflictModal').classList.add('hidden');}
function save(){
  records.sort((a,b)=>new Date(b.updateTime||b.date)-new Date(a.updateTime||a.date));
  localStorage.setItem('recs',JSON.stringify(records));
  refreshAll();
}
// 导出弹窗相关
function openExportModal(){
  if(!records.length){showMsg('无数据',1);return;}
  d.getElementById('exportModal').classList.remove('hidden');
  updatePreview();
}
function closeExportModal(){d.getElementById('exportModal').classList.add('hidden');}
function updatePreview(){
  let i=d.getElementById('exportName');
  let p=d.getElementById('filePreview');
  let t = new Date().toISOString().split('T')[0];
  p.textContent = `${i.value||'记录存档'}_${t}.txt`;
}
function doExport(){
  let name = d.getElementById('exportName').value.trim()||'记录存档';
  let fn = `${name}_${new Date().toISOString().split('T')[0]}.txt`;
  let blob = new Blob([JSON.stringify(records,null,2)],{type:'text/plain'});
  let url = URL.createObjectURL(blob);
  let a = d.createElement('a');a.href=url;a.download=fn;a.click();
  URL.revokeObjectURL(url);
  closeExportModal();
  showMsg('导出成功');
}
function importRec(f){
  let r=new FileReader();
  r.onload=e=>{
    try{
      let list=JSON.parse(e.target.result);
      let now = new Date().toISOString().split('T')[0];
      list.forEach(x=>{
        let ex=records.find(y=>y.name===x.name);
        if(ex){ex.content+='\n\n---导入---\n'+x.content;ex.updateTime=now;}
        else records.push(x);
      });
      save();
      showMsg('导入成功');
    }catch(e){showMsg('文件错误',1);}
  };
  r.readAsText(f);
}
function esc(s){return s.replace(/</g,'&lt;').replace( />/g,'&gt;');}
function fmtDate(s){return new Date(s).toLocaleDateString('zh-CN');}
function hl(t,k){return esc(t).replace(new RegExp(k,'gi'),m=>`<span class="highlight">${m}</span>`);}
</script>
</body>
</html>
